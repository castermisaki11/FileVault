<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♠ BLACKJACK ♠</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="particles"></div>

<!-- Mode toggle -->
<div id="mode-toggle">
  <button class="mode-btn active" data-mode="solo"   onclick="toggleMode('solo')">Solo</button>
  <button class="mode-btn"        data-mode="online" onclick="toggleMode('online')">Online</button>
</div>
<div id="online-badge"><span class="dot"></span><span id="badge-txt">0 ออนไลน์</span></div>

<!-- Result Overlay -->
<div id="result-overlay">
  <div class="overlay-bg" onclick="closeOverlay()"></div>
  <div class="result-box" id="result-box">
    <span class="result-icon" id="result-icon">🎉</span>
    <div class="result-title" id="result-title">YOU WIN!</div>
    <div class="result-sub"   id="result-sub">Dealer busts</div>
    <div class="result-money" id="result-money"></div>
    <button class="result-btn" onclick="closeOverlay()">
      <span>ตกลง</span>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<!-- Main -->
<div class="table">
  <h1>♠ BLACK<span>JACK</span> ♠</h1>
  <div class="divider"></div>

  <!-- Score + Money -->
  <div class="score-bar">
    <div class="score-item"><span class="num" id="wins">0</span>Win</div>
    <div class="score-item"><span class="num" id="losses">0</span>Lose</div>
    <div class="score-item"><span class="num" id="pushes">0</span>Push</div>
    <div class="score-item money-item">
      <span class="coin-icon">💰</span>
      <span class="num gold-num" id="balance">200</span>
    </div>
  </div>

  <!-- Bet row -->
  <div id="bet-row">
    <span class="bet-label">เดิมพัน</span>
    <div class="bet-chips">
      <button class="chip-btn" data-val="10"  onclick="setBet(10)">10</button>
      <button class="chip-btn active" data-val="50"  onclick="setBet(50)">50</button>
      <button class="chip-btn" data-val="100" onclick="setBet(100)">100</button>
      <button class="chip-btn" data-val="250" onclick="setBet(250)">250</button>
      <button class="chip-btn" data-val="500" onclick="setBet(500)">500</button>
      <button class="chip-btn" data-val="1000" onclick="setBet(1000)">1000</button>
    </div>
    <span class="bet-amount">฿<span id="cur-bet">50</span></span>
  </div>

  <!-- Online: room panel -->
  <div id="room-panel">
    <h3>🌐 Online Room</h3>
    <div class="room-row">
      <input id="inp-name" class="room-input" placeholder="ชื่อผู้เล่น" maxlength="20">
      <input id="inp-room" class="room-input" placeholder="ชื่อห้อง" maxlength="20" value="room1">
      <button class="room-btn" onclick="joinRoom()">เข้าห้อง</button>
    </div>
    <div id="room-status"></div>
  </div>

  <!-- Online log -->
  <div id="online-log"></div>

  <!-- Dealer zone -->
  <div class="zone" id="dealer-zone">
    <div class="zone-label">🎩 Dealer</div>
    <div class="hand" id="dealer-hand"></div>
    <div class="hand-value" id="dealer-value"></div>
  </div>

  <!-- Message -->
  <div class="message info" id="message">กด Deal เพื่อเริ่มเกม</div>

  <!-- Other players row (online) -->
  <div id="others-row"></div>

  <!-- My player zone -->
  <div class="zone my-zone" id="player-zone">
    <div class="zone-label" id="my-zone-label">👤 คุณ</div>
    <div class="hand" id="player-hand"></div>
    <div class="hand-value" id="player-value"></div>
    <div class="zone-bet" id="zone-bet"></div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-hit"   id="btn-hit"   disabled onclick="hit(event)">Hit</button>
    <button class="btn btn-deal"  id="btn-deal"  onclick="deal(event)">Deal</button>
    <button class="btn btn-stand" id="btn-stand" disabled onclick="stand(event)">Stand</button>
  </div>

  <p class="rules">Blackjack pays 1.5× · Dealer stands on 17 · เงินเริ่มต้น ฿200</p>
</div>

<script src="game.js"></script>
</body>
</html>
